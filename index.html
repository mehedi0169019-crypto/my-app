<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জন্ম নিবন্ধন যাচাই সিস্টেম</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Hind Siliguri', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
        }
        
        .card { 
            background-color: #ffffff; 
            width: 100%; 
            max-width: 480px; 
            padding: 35px 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1); 
            border-top: 5px solid #3182ce;
        }
        
        .header-title { text-align: center; color: #1a365d; margin-bottom: 5px; font-weight: 700; font-size: 24px; }
        .header-subtitle { text-align: center; color: #718096; margin-bottom: 25px; font-size: 14px; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #4a5568; font-weight: 600; font-size: 15px; }
        .input-group input { 
            width: 100%; 
            padding: 14px 15px; 
            border: 1.5px solid #cbd5e0; 
            border-radius: 10px; 
            font-size: 16px; 
            transition: all 0.3s ease; 
            background-color: #f7fafc;
        }
        .input-group input:focus { outline: none; border-color: #3182ce; background-color: #fff; box-shadow: 0 0 0 4px rgba(49, 130, 206, 0.15); }
        
        button { 
            width: 100%; 
            background: linear-gradient(to right, #3182ce, #2b6cb0); 
            color: white; 
            border: none; 
            padding: 15px; 
            font-size: 18px; 
            font-weight: 600; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            box-shadow: 0 4px 6px rgba(49, 130, 206, 0.2);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(49, 130, 206, 0.3); }
        button:active { transform: translateY(0); }
        button:disabled { background: #a0aec0; cursor: not-allowed; transform: none; box-shadow: none; }
        
        /* Loader Animation */
        #loader { display: none; text-align: center; margin-top: 20px; }
        .spinner {
            border: 4px solid #e2e8f0;
            border-top: 4px solid #3182ce;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-text { color: #3182ce; font-weight: 600; font-size: 15px; }

        /* Results Box */
        #result-box { display: none; margin-top: 25px; animation: fadeIn 0.5s ease; }
        .result-header { background-color: #3182ce; color: white; padding: 10px; text-align: center; border-radius: 8px 8px 0 0; font-weight: 600; }
        .result-body { background-color: #f7fafc; border: 1px solid #e2e8f0; border-top: none; border-radius: 0 0 8px 8px; padding: 15px; }
        
        .result-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #cbd5e0; }
        .result-item:last-child { border-bottom: none; }
        .result-label { font-weight: 600; color: #4a5568; width: 40%; font-size: 15px; }
        .result-value { color: #1a202c; width: 60%; text-align: right; font-weight: 700; font-size: 15px; word-break: break-word; }
        
        .error-msg { 
            color: #c53030; 
            background-color: #fff5f5; 
            border: 1px solid #feb2b2; 
            padding: 12px; 
            border-radius: 8px; 
            margin-top: 20px; 
            text-align: center; 
            display: none; 
            font-weight: 600; 
            font-size: 14px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="card">
        <h2 class="header-title">জন্ম নিবন্ধন যাচাই</h2>
        <p class="header-subtitle">অনলাইনে জন্ম নিবন্ধনের তথ্য খুঁজুন</p>
        
        <div class="input-group">
            <label for="brn">নিবন্ধন নম্বর (BRN)</label>
            <input type="number" id="brn" placeholder="১৭ ডিজিটের নিবন্ধন নম্বর দিন" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 17)">
        </div>
        
        <div class="input-group">
            <label for="dob">জন্ম তারিখ (DOB)</label>
            <input type="date" id="dob">
        </div>
        
        <button id="searchBtn" onclick="fetchData()">তথ্য যাচাই করুন</button>

        <div id="loader">
            <div class="spinner"></div>
            <div class="loader-text">ডেটা খোঁজা হচ্ছে, অপেক্ষা করুন...</div>
        </div>
        
        <div id="error-box" class="error-msg"></div>

        <div id="result-box">
            <div class="result-header">প্রাপ্ত তথ্য</div>
            <div class="result-body" id="result-content"></div>
        </div>
    </div>

    <script>
        const keyDictionary = {
            "name_bn": "নাম (বাংলা)",
            "name_en": "নাম (ইংরেজি)",
            "father_name_bn": "পিতার নাম (বাংলা)",
            "father_name_en": "পিতার নাম (ইংরেজি)",
            "mother_name_bn": "মাতার নাম (বাংলা)",
            "mother_name_en": "মাতার নাম (ইংরেজি)",
            "date_of_birth": "জন্ম তারিখ",
            "gender": "লিঙ্গ",
            "birth_place": "জন্মস্থান",
            "registration_date": "নিবন্ধনের তারিখ",
            "issuance_date": "ইস্যুর তারিখ",
            "brn": "নিবন্ধন নম্বর",
            "blood_group": "রক্তের গ্রুপ"
        };

        async function fetchData() {
            const brn = document.getElementById('brn').value;
            const dobRaw = document.getElementById('dob').value; // Example: "2006-01-13"
            
            const btn = document.getElementById('searchBtn');
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('result-box');
            const resultContent = document.getElementById('result-content');
            const errorBox = document.getElementById('error-box');

            // Reset UI
            resultBox.style.display = 'none';
            errorBox.style.display = 'none';

            if (!brn || !dobRaw) {
                showError("অনুগ্রহ করে নিবন্ধন নম্বর এবং জন্ম তারিখ দিন!");
                return;
            }

            if (brn.length !== 17) {
                showError("জন্ম নিবন্ধন নম্বর অবশ্যই ১৭ ডিজিটের হতে হবে!");
                return;
            }

            // Date Format Conversion (YYYY-MM-DD to DD-MM-YYYY)
            const [year, month, day] = dobRaw.split('-');
            const dobFormatted = `${day}-${month}-${year}`; // Now it becomes "13-01-2006"

            loader.style.display = 'block';
            btn.disabled = true;
            btn.innerText = "খোঁজা হচ্ছে...";

            // API Link using the formatted date
            const targetUrl = `https://infodokan.myani.top/apilab/BIRTH-INFO-MAIN.php?brn=${brn}&dob=${dobFormatted}`;
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                const responseText = await response.text();

                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (parseError) {
                    loader.style.display = 'none';
                    btn.disabled = false;
                    btn.innerText = "তথ্য যাচাই করুন";
                    showError("সার্ভার থেকে সঠিক তথ্য পাওয়া যায়নি। দয়া করে কিছুক্ষণ পর আবার চেষ্টা করুন।");
                    return;
                }

                loader.style.display = 'none';
                btn.disabled = false;
                btn.innerText = "তথ্য যাচাই করুন";

                if(data.registration_date === "N/A" || data.error || Object.keys(data).length === 0) {
                    showError("এই নম্বরটির কোনো তথ্য পাওয়া যায়নি! জন্ম নিবন্ধন নম্বর এবং জন্ম তারিখ সঠিক কি না চেক করুন।");
                    return;
                }

                let htmlData = '';
                
                for (const [key, value] of Object.entries(data)) {
                    if(value && value !== "N/A" && value.trim() !== "") {
                        let formattedKey = keyDictionary[key.toLowerCase()] || key.replace(/_/g, ' ').toUpperCase(); 
                        
                        htmlData += `
                            <div class="result-item">
                                <span class="result-label">${formattedKey}</span>
                                <span class="result-value">${value}</span>
                            </div>
                        `;
                    }
                }

                if(htmlData === '') {
                    showError("সার্ভার থেকে কোনো বৈধ ডেটা পাওয়া যায়নি।");
                    return;
                }

                resultContent.innerHTML = htmlData;
                resultBox.style.display = 'block';

            } catch (error) {
                loader.style.display = 'none';
                btn.disabled = false;
                btn.innerText = "তথ্য যাচাই করুন";
                showError("ইন্টারনেট কানেকশনে সমস্যা! অনুগ্রহ করে আপনার ইন্টারনেট চেক করুন।");
                console.error("Fetch Error:", error);
            }
        }

        function showError(msg) {
            const errorBox = document.getElementById('error-box');
            errorBox.innerText = msg;
            errorBox.style.display = 'block';
        }
    </script>

</body>
</html>
